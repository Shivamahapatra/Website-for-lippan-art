{% extends 'base.html' %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto; background: #fff; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
    <h1 style="color: var(--primary-color); margin-bottom: 2rem; text-align: center;">Checkout</h1>
    
    <div style="background: var(--bg-color); padding: 1.5rem; border-radius: 10px; margin-bottom: 2rem;">
        <h3 style="margin-bottom: 0.5rem;">Order Summary</h3>
        <p style="margin: 0;"><strong>Product:</strong> {{ product.name }} ({{ size }})</p>
        <p style="margin: 0;"><strong>Price:</strong> ₹{{ product.price }}</p>
    </div>

    <form method="POST">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="customer_name" required>
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Complete Shipping Address</label>
            <textarea name="shipping_address" rows="4" required></textarea>
        </div>
        
        <!-- Placeholder for actual Razorpay Payment Button -->
        <button type="submit" class="btn" style="width: 100%; font-size: 1.1rem; padding: 1rem;">
            Place Order (₹{{ product.price }})
        </button>
        <p style="text-align: center; font-size: 0.8rem; color: #888; margin-top: 1rem;">
            *Payment gateway simulation. In a real online deployment, this would open Razorpay.
        </p>
    </form>
</div>
{% endblock %}
