{% extends 'admin_base.html' %}

{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center;">
    <h2>Inventory & Pricing Management</h2>
</div>

<div class="card" style="margin-bottom: 2rem; padding: 1.5rem; background: #fff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
    <h3>Add New Product</h3>
    <form method="POST" action="{{ url_for('add_inventory') }}" enctype="multipart/form-data" style="display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 1rem;">
        <input type="text" name="name" placeholder="Product Name" required style="flex: 1; min-width: 200px;">
        <input type="text" name="sizes" placeholder="Sizes (e.g., 12x12, 18x18)" required style="flex: 1; min-width: 150px;">
        <input type="number" step="0.01" name="price" placeholder="Price (₹)" required style="width: 120px;">
        <div class="form-group" style="width: 100%;">
            <label>Product Image (Direct Cloudinary Upload)</label>
            <input type="file" accept="image/*" id="addImage" onchange="uploadToCloudinary(this)">
            <input type="hidden" name="cloudinary_url" id="cloudinaryUrl">
            <small id="uploadStatus" style="color: #666;">Select an image to upload directly to Cloudinary.</small>
        </div>
        <textarea name="description" placeholder="Description" required style="width: 100%; margin-top: 0.5rem;"></textarea>
        <button type="submit" id="submitBtn" class="btn btn-primary" style="margin-top: 0.5rem;" disabled>Add Product (Upload Image First)</button>
    </form>
</div>

<table class="data-table" style="margin-top: 2rem;">
    <thead>
        <tr>
            <th>Product Name</th>
            <th>Available Sizes</th>
            <th>Price (₹)</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>
        {% for product in products %}
        <tr>
            <td><strong>{{ product.name }}</strong></td>
            <td>{{ product.sizes }}</td>
            <td>
                <form method="POST" action="{{ url_for('update_inventory', product_id=product.id) }}" style="display: flex; gap: 0.5rem; align-items: center;">
                    <input type="number" step="0.01" name="price" value="{{ product.price }}" required style="width: 100px;">
                    <button type="submit" class="btn" style="padding: 0.2rem 0.5rem; font-size: 0.9rem;">Save Price</button>
                </form>
            </td>
            <td>
                <div style="display: flex; gap: 0.5rem; align-items: center;">
                    <a href="{{ url_for('edit_inventory', product_id=product.id) }}" class="btn btn-primary" style="padding: 0.2rem 0.5rem; font-size: 0.9rem; text-decoration: none;">Edit</a>
                    <form method="POST" action="{{ url_for('delete_inventory', product_id=product.id) }}" onsubmit="return confirm('Are you sure you want to delete this product?');" style="margin: 0;">
                        <button type="submit" class="btn" style="padding: 0.2rem 0.5rem; font-size: 0.9rem; background-color: #e74c3c; color: white;">Delete</button>
                    </form>
                </div>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
<script>
async function uploadToCloudinary(input) {
    if (!input.files || !input.files[0]) return;
    
    const file = input.files[0];
    const statusText = document.getElementById('uploadStatus');
    const submitBtn = document.getElementById('submitBtn');
    const hiddenUrl = document.getElementById('cloudinaryUrl');
    
    statusText.innerText = "Uploading to Cloudinary... Please wait.";
    statusText.style.color = "#e67e22";
    submitBtn.disabled = true;
    submitBtn.innerText = "Uploading Image...";
    
    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', 'lippan_art');
    
    try {
        const response = await fetch('https://api.cloudinary.com/v1_1/dnl5901jw/image/upload', {
            method: 'POST',
            body: formData
        });
        
        const data = await response.json();
        
        if (data.secure_url) {
            hiddenUrl.value = data.secure_url;
            statusText.innerText = "Image uploaded successfully!";
            statusText.style.color = "#27ae60";
            submitBtn.disabled = false;
            submitBtn.innerText = "Add Product";
        } else {
            statusText.innerText = "Upload failed: " + (data.error ? data.error.message : "Unknown error");
            statusText.style.color = "red";
        }
    } catch (error) {
        statusText.innerText = "Network error during upload.";
        statusText.style.color = "red";
    }
}
</script>
{% endblock %}
