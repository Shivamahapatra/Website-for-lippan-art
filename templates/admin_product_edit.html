{% extends 'admin_base.html' %}

{% block content %}
<h2>Edit Product: {{ product.name }}</h2>

<form method="POST" action="{{ url_for('edit_inventory', product_id=product.id) }}" enctype="multipart/form-data" class="form-container" style="max-width: 600px;">
    <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ product.name }}" required>
    </div>
    <div class="form-group">
        <label>Description</label>
        <textarea name="description" rows="4" required>{{ product.description }}</textarea>
    </div>
    <div class="form-group">
        <label>Price (₹)</label>
        <input type="number" step="0.01" name="price" value="{{ product.price }}" required>
    </div>
    <div class="form-group">
        <label>Available Sizes (comma separated)</label>
        <input type="text" name="sizes" value="{{ product.sizes }}" required>
    </div>
    <div class="form-group">
        <label>Upload New Image (Leave empty to keep current image)</label>
        <input type="file" name="image_file" accept="image/*">
    </div>
    
    <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Update Product</button>
    <a href="{{ url_for('admin_inventory') }}" class="btn" style="background: #95a5a6; margin-top: 1rem; margin-left: 1rem;">Cancel</a>
</form>
{% endblock %}
