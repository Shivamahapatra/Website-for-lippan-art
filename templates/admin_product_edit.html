{% extends 'admin_base.html' %}

{% block content %}
<h2>Edit Product: {{ product.name }}</h2>

<form method="POST" action="{{ url_for('edit_inventory', product_id=product.id) }}" enctype="multipart/form-data" class="form-container" style="max-width: 600px;">
    <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ product.name }}" required>
    </div>
    <div class="form-group">
        <label>Description</label>
        <textarea name="description" rows="4" required>{{ product.description }}</textarea>
    </div>
    <div class="form-group">
        <label>Price (₹)</label>
        <input type="number" step="0.01" name="price" value="{{ product.price }}" required>
    </div>
    <div class="form-group">
        <label>Available Sizes (comma separated)</label>
        <input type="text" name="sizes" value="{{ product.sizes }}" required>
    </div>
    <div class="form-group" style="width: 100%;">
        <label>Update Product Image (Direct Cloudinary Upload)</label>
        <input type="file" accept="image/*" id="addImage" onchange="uploadToCloudinary(this)">
        <input type="hidden" name="cloudinary_url" id="cloudinaryUrl">
        <small id="uploadStatus" style="color: #666;">Leave blank to keep the current image, or select a new one to upload directly to Cloudinary.</small>
    </div>
    
    <button type="submit" id="submitBtn" class="btn btn-primary" style="margin-top: 0.5rem;">Save Changes</button>
    <a href="{{ url_for('admin_inventory') }}" class="btn" style="background: #95a5a6; margin-top: 1rem; margin-left: 1rem;">Cancel</a>
</form>

<script>
async function uploadToCloudinary(input) {
    if (!input.files || !input.files[0]) return;
    
    const file = input.files[0];
    const statusText = document.getElementById('uploadStatus');
    const submitBtn = document.getElementById('submitBtn');
    const hiddenUrl = document.getElementById('cloudinaryUrl');
    
    statusText.innerText = "Uploading to Cloudinary... Please wait.";
    statusText.style.color = "#e67e22";
    submitBtn.disabled = true;
    submitBtn.innerText = "Uploading Image...";
    
    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', 'lippan_art');
    
    try {
        const response = await fetch('https://api.cloudinary.com/v1_1/dnl5901jw/image/upload', {
            method: 'POST',
            body: formData
        });
        
        const data = await response.json();
        
        if (data.secure_url) {
            hiddenUrl.value = data.secure_url;
            statusText.innerText = "Image uploaded successfully!";
            statusText.style.color = "#27ae60";
            submitBtn.disabled = false;
            submitBtn.innerText = "Save Changes";
        } else {
            statusText.innerText = "Upload failed: " + (data.error ? data.error.message : "Unknown error");
            statusText.style.color = "red";
        }
    } catch (error) {
        statusText.innerText = "Network error during upload.";
        statusText.style.color = "red";
    }
}
</script>
{% endblock %}
