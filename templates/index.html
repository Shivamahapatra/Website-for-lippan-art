{% extends 'base.html' %}

{% block content %}
<div style="text-align: center; margin-bottom: 3rem;">
    <h1 style="font-size: 3rem; color: var(--primary-color);">Exquisite Lippan Art</h1>
    <p style="font-size: 1.2rem; color: #666; max-width: 600px; margin: 0 auto;">
        Handcrafted mud and mirror work reflecting tradition and elegance. Perfect for your home or office.
    </p>
</div>

<div class="product-grid">
    {% for product in products %}
    <a href="{{ url_for('product', product_id=product.id) }}" class="product-card">
        <div class="product-img-wrapper">
            <!-- Using a placeholder pattern since we don't have real images yet -->
            <div style="width: 100%; height: 100%; background: linear-gradient(45deg, var(--secondary-color), var(--accent-color)); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;">
                {{ product.name }}
            </div>
        </div>
        <div class="product-info">
            <div class="product-title">{{ product.name }}</div>
            <div class="product-price">₹{{ product.price }}</div>
        </div>
    </a>
    {% endfor %}
</div>
{% endblock %}
